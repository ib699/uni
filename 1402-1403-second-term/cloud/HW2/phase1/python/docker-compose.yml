version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.12.2
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=12345
    mem_limit: 2g
    networks:
      custom_network:
        ipv4_address: 192.168.249.3 
    container_name: my_elasticsearch

  redis:
    image: redis:alpine3.19
    ports:
      - "6379:6379"
    networks:
      custom_network:
        ipv4_address: 192.168.249.4
    container_name: my-redis-container

  my-python-app:
    build: .
    image: my-python-app
    ports:
      - "5000:5000"
    networks:
      custom_network:
        ipv4_address: 192.168.249.5
    depends_on:
      - elasticsearch
      - redis

        #  delay:
        #image: alpine
        #command: ["sh", "-c", "sleep 8"]
        # depends_on:
        #- elasticsearch
        #- redis

networks:
  custom_network:
    ipam:
      driver: default
      config:
        - subnet: 192.168.249.0/24
